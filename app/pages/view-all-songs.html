<!-- 1. PANTALLA DE TODAS LAS CANCIONES -->
<section id="view-all-songs" style="display: none;">
  <header class="detail-header">
    <div class="header-content">
      <div class="brand-text">
        <h1>Canciones</h1>
      </div>
    </div>
  </header>

  <main class="content list-container">
    <div class="list-stats" id="all-songs-stats-info">Todas las canciones</div>
    <div class="search-container">
      <l-icon name="search"></l-icon>
      <input 
        placeholder="Buscar en todas las canciones..."
        type="search" 
        class="search-song" id="all-songs-search">
    </div>
    <ul id="all-songs-list" class="song-list"></ul>
  </main>
</section>
